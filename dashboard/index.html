<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Specimen Workflow Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <h1>Specimen Journey Dashboard</h1>
          <p>Interactive workflow timelines with optional A/B cohort comparison.</p>
        </div>
        <div class="global-controls">
          <button id="comparison-btn" type="button">Comparison</button>
          <label class="toggle">
            <input id="toggle-cancellation" type="checkbox" checked />
            <span>Show likeliness of cancellation</span>
          </label>
          <label class="jitter-control" for="jitter-slider">
            <span>Point Jitter</span>
            <input id="jitter-slider" type="range" min="0" max="2" step="0.05" value="0" />
            <strong id="jitter-value">0.00x</strong>
          </label>
        </div>
      </header>

      <section id="status" class="status">Loading data...</section>

      <section id="panel-grid" class="panel-grid">
        <article class="panel" id="panel-left">
          <div class="panel-head">
            <h2>Primary Cohort</h2>
            <div class="panel-stats" id="left-stats"></div>
          </div>

          <div class="filters">
            <label>Test Code
              <select id="left-filter-test_code" data-panel="left" data-field="test_code"></select>
            </label>
            <label>Street
              <select id="left-filter-order_street" data-panel="left" data-field="order_street"></select>
            </label>
            <label>Performing Dept
              <select id="left-filter-test_performing_dept" data-panel="left" data-field="test_performing_dept"></select>
            </label>
            <label>Performing Location
              <select id="left-filter-test_performing_location" data-panel="left" data-field="test_performing_location"></select>
            </label>
            <label>Order Day Type
              <select id="left-filter-day_type" data-panel="left" data-field="day_type"></select>
            </label>
          </div>

          <div class="chart timeline" id="left-timeline"></div>
          <div class="chart flow" id="left-flow"></div>
          <div class="chart river" id="left-river"></div>
          <div class="chart scatter" id="left-scatter"></div>
        </article>

        <article class="panel" id="panel-right" hidden>
          <div class="panel-head">
            <h2>Comparison Cohort</h2>
            <div class="panel-stats" id="right-stats"></div>
          </div>

          <div class="filters">
            <label>Test Code
              <select id="right-filter-test_code" data-panel="right" data-field="test_code"></select>
            </label>
            <label>Street
              <select id="right-filter-order_street" data-panel="right" data-field="order_street"></select>
            </label>
            <label>Performing Dept
              <select id="right-filter-test_performing_dept" data-panel="right" data-field="test_performing_dept"></select>
            </label>
            <label>Performing Location
              <select id="right-filter-test_performing_location" data-panel="right" data-field="test_performing_location"></select>
            </label>
            <label>Order Day Type
              <select id="right-filter-day_type" data-panel="right" data-field="day_type"></select>
            </label>
          </div>

          <div class="chart timeline" id="right-timeline"></div>
          <div class="chart flow" id="right-flow"></div>
          <div class="chart river" id="right-river"></div>
          <div class="chart scatter" id="right-scatter"></div>
        </article>
      </section>
    </main>
  </body>
</html>
